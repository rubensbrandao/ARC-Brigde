<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Bridge</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#070f1d;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

.logo { height:45px; }

/* BOTÕES */
button {
  background:linear-gradient(90deg,#344566,#8b8e95);
  border:none;
  padding:10px 16px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* CONTAINER */
.container {
  max-width:1000px;
  margin:auto;
  padding:15px;
}

/* BANNER */
.banner {
  height:70px;
  border-radius:12px;
  background:linear-gradient(90deg,#344566,#8b8e95);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  margin-bottom:15px;
}

/* BOX */
.box {
  background:#0d1628;
  border-radius:18px;
  padding:20px;
  margin-bottom:15px;
}

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#111c33;
  color:white;
}

/* INFO */
.info {
  font-size:13px;
  opacity:0.7;
}

/* FOOTER */
.footer {
  text-align:center;
  margin:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <img src="logo.webp" class="logo">
  <button onclick="toggleWallet()" id="connectBtn">Conectar</button>
</header>

<div class="container">

<div class="banner">
  Seamless Bridge • Sepolia ⇄ ARC • Powered by USDC
</div>

<!-- SWAP -->
<div class="box">
  <h3>Swap (mesma rede)</h3>

  <p id="network">Rede: -</p>
  <p id="ethBalance">ETH: -</p>
  <p id="usdcBalance">USDC: -</p>

  <button onclick="swap()">Swap ETH → USDC</button>

  <p class="info">Necessário USDC para bridge</p>
</div>

<!-- BRIDGE -->
<div class="box">
  <h3>Bridge</h3>

  <div style="display:flex; gap:10px;">
    <select id="from">
      <option value="11155111">Sepolia</option>
      <option value="5042002">ARC</option>
    </select>

    <button onclick="invert()">🔄</button>

    <select id="to">
      <option value="5042002">ARC</option>
      <option value="11155111">Sepolia</option>
    </select>
  </div>

  <input id="amount" placeholder="Quantidade USDC">

  <button onclick="handleBridge()" style="margin-top:15px;">
    Bridge
  </button>

  <p class="info" id="hint"></p>
</div>

</div>

<div class="footer">
  Desenvolvido por <a href="https://x.com/Rubensbrandao1" target="_blank" style="color:white">@Rubensbrandao1</a>
</div>

<script>
let provider, signer, user;

const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";

const NETWORKS = {
  11155111: {
    name: "Sepolia",
    chainId: "0xaa36a7",
    rpc: "https://rpc.sepolia.org"
  },
  5042002: {
    name: "ARC",
    chainId: "0x4ce3ea",
    rpc: "https://rpc.testnet.arc.network"
  }
};

async function toggleWallet() {
  if (!window.ethereum) return alert("Instale MetaMask");

  if (!user) {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    user = await signer.getAddress();
    document.getElementById("connectBtn").innerText = "Desconectar";
    loadBalances();
  } else {
    user = null;
    document.getElementById("connectBtn").innerText = "Conectar";
  }
}

async function loadBalances() {
  const net = await provider.getNetwork();
  document.getElementById("network").innerText = "Rede: " + net.chainId;

  const eth = await provider.getBalance(user);
  document.getElementById("ethBalance").innerText =
    "ETH: " + ethers.formatEther(eth);

  const usdc = new ethers.Contract(
    USDC,
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const bal = await usdc.balanceOf(user);
  let usdcFormatted = (bal / 1e6).toFixed(2);

  document.getElementById("usdcBalance").innerText =
    "USDC: " + usdcFormatted;

  if (usdcFormatted == 0) {
    document.getElementById("hint").innerText =
      "Você precisa fazer swap de ETH para USDC antes da bridge";
  } else {
    document.getElementById("hint").innerText = "";
  }
}

function invert() {
  let f = document.getElementById("from");
  let t = document.getElementById("to");
  let temp = f.value;
  f.value = t.value;
  t.value = temp;
}

function swap() {
  window.open("https://app.uniswap.org/#/swap?chain=sepolia");
}

async function switchNetwork(chainId) {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: NETWORKS[chainId].chainId }]
    });
  } catch (e) {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [{
        chainId: NETWORKS[chainId].chainId,
        chainName: NETWORKS[chainId].name,
        rpcUrls: [NETWORKS[chainId].rpc],
        nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }
      }]
    });
  }
}

async function handleBridge() {
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  await switchNetwork(from);

  alert("Bridge real com Circle entra aqui 🔥");
}
</script>

</body>
</html>
