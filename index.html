<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sepolia ⇄ ARC Bridge</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#070f1d;
  color:#fff;
}
header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  align-items:center;
}
.banner{
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(90deg,#344566,#8b8e95);
}
.container{
  display:flex;
  gap:20px;
  justify-content:center;
  padding:20px;
}
.card{
  background:#0f1a2e;
  border-radius:12px;
  padding:20px;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#344566,#8b8e95);
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  transform:scale(1.02);
}
.footer{
  text-align:center;
  padding:10px;
  font-size:12px;
}
</style>
</head>
<body>

<header>
  <div>LOGO</div>
  <button>Connect Wallet</button>
</header>

<div class="banner">
  Sepolia ⇄ ARC — Swap & Bridge
</div>

<div class="container">

  <div class="card">
    <h3>Swap (Sepolia)</h3>
    <label>ETH</label>
    <input placeholder="Amount">
    <label>USDC</label>
    <input placeholder="Estimated">
    <button>Swap</button>
  </div>

  <div class="card">
    <h3>Bridge</h3>
    <label>From (Sepolia USDC)</label>
    <input placeholder="Amount">
    <label>To (ARC USDC)</label>
    <input placeholder="Estimated">
    <button>Bridge</button>
  </div>

</div>

<div class="footer">
Developed by @Rubensbrandao1
</div>

</body>
</html>
