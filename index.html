
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Pro</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<style>
body{margin:0;background:#070f1d;color:#fff;font-family:Arial;}
.container{max-width:1000px;margin:auto;padding:20px;}
.header{display:flex;justify-content:space-between;align-items:center;}
.wallet{background:linear-gradient(90deg,#344566,#8b8e95);padding:10px 20px;border-radius:20px;cursor:pointer;}
.banner{height:400px;border-radius:20px;margin:20px 0;background:url('https://via.placeholder.com/1050x400') center/cover;}
.row{display:flex;gap:20px;}
.box{flex:1;background:#0e1629;padding:20px;border-radius:20px;}
.box-banner{height:150px;border-radius:15px;margin-bottom:15px;background:url('https://via.placeholder.com/500x150') center/cover;}
input{width:100%;padding:12px;background:#000;border:none;color:#fff;margin-top:10px;border-radius:10px;}
button{width:100%;padding:15px;margin-top:15px;border:none;border-radius:15px;background:linear-gradient(90deg,#6a11cb,#2575fc);color:#fff;cursor:pointer;}
.switch{text-align:center;font-size:24px;margin:10px;cursor:pointer;}
.small{font-size:12px;opacity:.7;}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div>LOGO</div>
  <div id="walletBtn" class="wallet">Connect</div>
</div>

<div class="banner"></div>

<div class="row">

<div class="box">
  <div class="box-banner"></div>
  <h3>Swap (Sepolia)</h3>
  <div>ETH: <span id="eth">-</span></div>
  <div>USDC: <span id="usdc">-</span></div>
  <input id="amount" placeholder="ETH amount">
  <button onclick="swap()">Swap ETH → USDC</button>
</div>

<div class="box">
  <div class="box-banner"></div>
  <h3>Bridge</h3>
  <div>USDC Sepolia: <span id="usdcSep">-</span></div>
  <div>USDC ARC: <span id="usdcArc">-</span></div>
  <div class="switch">⇅</div>
  <input placeholder="Amount">
  <button onclick="bridge()">Bridge</button>
</div>

</div>

<div class="small" id="addr"></div>

</div>

<script>
let provider, signer, address;

const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238"; // Sepolia

async function connect(){
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  address = await signer.getAddress();
  document.getElementById("walletBtn").innerText = address.slice(0,6)+"..."+address.slice(-4);
  document.getElementById("addr").innerText = address;

  loadBalances();
}

async function loadBalances(){
  const eth = await provider.getBalance(address);
  document.getElementById("eth").innerText = ethers.formatEther(eth);

  const abi = ["function balanceOf(address) view returns (uint256)"];
  const token = new ethers.Contract(USDC, abi, provider);
  const bal = await token.balanceOf(address);
  document.getElementById("usdc").innerText = (bal/1e6).toFixed(2);
  document.getElementById("usdcSep").innerText = (bal/1e6).toFixed(2);
}

async function swap(){
  alert("Integrate 0x API here (already structured)");
}

async function bridge(){
  alert("Integrate Circle Bridge Kit here");
}

document.getElementById("walletBtn").onclick = connect;
</script>

</body>
</html>
