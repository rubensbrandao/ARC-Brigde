<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Bridge</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Inter, Arial;
  background:#070f1d;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
}

.logo { height:45px; }

/* NETWORK BADGE */
.network {
  font-size:14px;
  opacity:0.8;
}

/* BUTTON */
button {
  background:linear-gradient(90deg,#344566,#8b8e95);
  border:none;
  padding:12px 18px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
  opacity:0.9;
}

/* MAIN */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* TOP BANNER */
.top-banner {
  height:70px;
  border-radius:14px;
  background:linear-gradient(90deg,#344566,#8b8e95);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  margin-bottom:10px;
}

/* HEADLINE */
.headline {
  text-align:center;
  font-size:20px;
  margin-bottom:20px;
  opacity:0.9;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* BOX */
.box {
  background:#0d1628;
  padding:20px;
  border-radius:18px;
}

/* SUB BANNER */
.sub-banner {
  height:50px;
  border-radius:10px;
  background:#111c33;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:15px;
  font-size:14px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111c33;
  color:white;
}

/* INFO */
.info {
  font-size:13px;
  opacity:0.6;
  margin-top:8px;
}

/* INVERT */
.invert {
  text-align:center;
  margin:10px 0;
  cursor:pointer;
}

/* FOOTER */
.footer {
  text-align:center;
  margin:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <img src="logo.webp" class="logo">
  <div class="network" id="network">Rede: -</div>
  <button onclick="connect()" id="btn">Conectar</button>
</header>

<div class="container">

<div class="top-banner">
  Conectando Sepolia ⇄ ARC Testnet sem limites
</div>

<div class="headline">
  A forma mais simples de mover USDC entre redes
</div>

<div class="grid">

<!-- SWAP -->
<div class="box">

<div class="sub-banner">
  Convert ETH → USDC on Sepolia
</div>

<p id="eth">ETH: -</p>
<p id="usdc">USDC: -</p>

<input placeholder="Quantidade ETH">

<button onclick="swap()">Swap agora</button>

<p class="info">Swap ocorre na Sepolia</p>

</div>

<!-- BRIDGE -->
<div class="box">

<div class="sub-banner">
  Bridge Sepolia → ARC Testnet (USDC)
</div>

<p id="bridgeBalance">USDC: -</p>

<input id="amount" placeholder="Quantidade USDC">

<input id="slippage" placeholder="Slippage % (ex: 0.5)">

<div class="invert" onclick="invert()">🔄 Inverter direção</div>

<button onclick="bridge()">Bridge</button>

<p class="info" id="hint"></p>

</div>

</div>

</div>

<div class="footer">
  Desenvolvido por <a href="https://x.com/Rubensbrandao1" target="_blank" style="color:white">@Rubensbrandao1</a>
</div>

<script>
let provider, signer, user;
let direction = "sepolia-arc";

const USDC = "0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238";

async function connect() {
  if (!window.ethereum) return alert("Instale MetaMask");

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();
  user = await signer.getAddress();

  // assinatura (como vc pediu)
  await signer.signMessage("Login ARC Bridge");

  document.getElementById("btn").innerText = "Conectado";

  load();
}

async function load() {
  const net = await provider.getNetwork();

  document.getElementById("network").innerText =
    net.chainId == 11155111 ? "Sepolia" : "ARC";

  const eth = await provider.getBalance(user);

  document.getElementById("eth").innerText =
    "ETH: " + ethers.formatEther(eth);

  const usdc = new ethers.Contract(
    USDC,
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const bal = await usdc.balanceOf(user);
  const val = (bal / 1e6).toFixed(2);

  document.getElementById("usdc").innerText = "USDC: " + val;
  document.getElementById("bridgeBalance").innerText = "USDC: " + val;

  if (val == 0) {
    document.getElementById("hint").innerText =
      "Faça swap de ETH → USDC primeiro";
  } else {
    document.getElementById("hint").innerText = "";
  }
}

function swap() {
  window.open("https://app.uniswap.org/#/swap?chain=sepolia");
}

function invert() {
  direction = direction === "sepolia-arc" ? "arc-sepolia" : "sepolia-arc";

  document.querySelector(".sub-banner:last-child").innerText =
    direction === "sepolia-arc"
      ? "Bridge Sepolia → ARC Testnet (USDC)"
      : "Bridge ARC → Sepolia (USDC)";
}

async function bridge() {
  alert("Integração com Circle entra aqui 🔥");
}
</script>

</body>
</html>
